services:
  wall:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wall-app
    ports:
      - "3020:3020"
    environment:
      # Flask Configuration
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=3020
      
      # SSO Configuration
      - SSO_MODE=${SSO_MODE:-dev}
      - JWT_SECRET=${IMAGE_MOSAIC_JWT_SECRET:-dev-secret-change-in-production}
      - APP_AUDIENCE=${APP_AUDIENCE:-wall-app}
      - PORTAL_URL=${PORTAL_URL:-http://localhost:5000}
      
      # Application Configuration
      - SERVER_SECRET_KEY=${SERVER_SECRET_KEY:-dev-secret-change-in-production}
      - DEBUG=${DEBUG:-False}
      
      # User and Rate Limiting
      - DEV_USER_EMAIL=${DEV_USER_EMAIL:-demo@example.com}
      - MAX_SESSIONS_PER_USER=${MAX_SESSIONS_PER_USER:-3}
      - MAX_SESSIONS_GLOBAL=${MAX_SESSIONS_GLOBAL:-100}
    
    volumes:
      # Persisti i dati degli utenti
      - wall_users_data:/app/users_data
      # Persisti il file whitelist
      - wall_data:/app/data
    
    restart: unless-stopped
    
    # Configurazione di rete
    networks:
      - wall_network
    
    # Limiti di risorse (opzionale)
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

volumes:
  wall_users_data:
    driver: local
  wall_data:
    driver: local

networks:
  wall_network:
    driver: bridge
