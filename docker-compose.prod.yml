services:
  wall:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wall-app-prod
    environment:
      # Flask Configuration
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=3020
      
      # SSO Configuration (DEVE essere configurato!)
      - SSO_MODE=production
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET non configurato}
      - APP_AUDIENCE=${APP_AUDIENCE:-wall-app}
      - PORTAL_URL=${PORTAL_URL:?PORTAL_URL non configurato}
      
      # Application Configuration
      - SERVER_SECRET_KEY=${SERVER_SECRET_KEY:?SERVER_SECRET_KEY non configurato}
      - DEBUG=False
      
      # User and Rate Limiting
      - MAX_SESSIONS_PER_USER=${MAX_SESSIONS_PER_USER:-3}
      - MAX_SESSIONS_GLOBAL=${MAX_SESSIONS_GLOBAL:-100}
    
    volumes:
      # Persisti i dati degli utenti
      - wall_users_data:/app/users_data
      # Persisti il file whitelist
      - wall_data:/app/data
    
    restart: always
    
    networks:
      - wall_network
    
    # Limiti di risorse
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M
    
    # Expose solo all'interno della rete (Nginx farà da proxy)
    expose:
      - "3020"

  nginx:
    image: nginx:alpine
    container_name: wall-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro  # Monta certificati SSL se disponibili
    depends_on:
      - wall
    restart: always
    networks:
      - wall_network

volumes:
  wall_users_data:
    driver: local
  wall_data:
    driver: local

networks:
  wall_network:
    driver: bridge
